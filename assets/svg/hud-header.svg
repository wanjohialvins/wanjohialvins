<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <style>
      @keyframes scan {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }
      @keyframes flicker {
        0% { opacity: 0.8; }
        5% { opacity: 0.4; }
        10% { opacity: 0.9; }
        15% { opacity: 0.3; }
        20% { opacity: 0.8; }
        100% { opacity: 1; }
      }
      .grid { stroke: #30363d; stroke-width: 0.5; }
      .scan-line { fill: none; stroke: #58a6ff; stroke-width: 2; opacity: 0.2; filter: blur(2px); }
      .text { fill: #c9d1d9; font-family: 'Courier New', Courier, monospace; font-size: 14px; }
      .accent { fill: #58a6ff; }
      .dim { fill: #8b949e; }
      .glitch { animation: flicker 3s infinite; }
    </style>
  </defs>
  
  <!-- Background Grid -->
  <rect width="100%" height="100%" fill="url(#grid-grad)" />
  <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" class="grid"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#smallGrid)" />

  <!-- Scanning Line -->
  <line x1="0" y1="0" x2="800" y2="0" class="scan-line">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" dur="4s" repeatCount="indefinite" />
  </line>

  <!-- HUD Frame -->
  <path d="M 20 15 L 780 15 L 780 185 L 20 185 Z" fill="none" stroke="#30363d" stroke-width="1" />
  <path d="M 20 15 L 60 15 M 20 15 L 20 55" fill="none" stroke="#58a6ff" stroke-width="3" />
  <path d="M 780 15 L 740 15 M 780 15 L 780 55" fill="none" stroke="#58a6ff" stroke-width="3" />
  <path d="M 20 185 L 60 185 M 20 185 L 20 145" fill="none" stroke="#58a6ff" stroke-width="3" />
  <path d="M 780 185 L 740 185 M 780 185 L 780 145" fill="none" stroke="#58a6ff" stroke-width="3" />

  <!-- Divider line between info and name -->
  <line x1="40" y1="100" x2="760" y2="100" stroke="#30363d" stroke-width="0.5" />

  <!-- Top Band: Info Labels -->
  <text x="40" y="40" class="text glitch">[ STATUS: ONLINE ]</text>
  <text x="40" y="60" class="text" font-size="10">STACK: FULL-STACK WEB DEVELOPMENT</text>
  <text x="40" y="76" class="text" font-size="10">FOCUS: UI/UX · REACT · NODE.JS · PHP</text>
  <text x="40" y="92" class="text" font-size="10">BASED IN: NAIROBI, KENYA</text>

  <text x="760" y="40" class="text" text-anchor="end">ROLE: DEVELOPER</text>
  <text x="760" y="60" class="text dim" font-size="10" text-anchor="end">AVAILABILITY: OPEN</text>

  <!-- Bottom Band: Name & Title -->
  <text x="400" y="140" class="text accent" font-size="32" font-weight="bold" text-anchor="middle" style="letter-spacing: 5px;">ALVINS WANJOHI</text>
  <text x="400" y="165" class="text" font-size="13" text-anchor="middle" opacity="0.7">FULL-STACK DEVELOPER</text>

  <!-- Pulsing Data Indicator -->
  <circle cx="760" cy="178" r="5" fill="#238636" style="animation: pulse 1s infinite;" />
</svg>
