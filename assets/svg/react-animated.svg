<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 64 64">
  <style>
    @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { r: 5; } 50% { r: 6.5; } }
    .orbit { transform-origin: center; animation: orbit 8s linear infinite; }
    .orbit-slow { transform-origin: center; animation: orbit 16s linear infinite; }
    .orbit-fast { transform-origin: center; animation: orbit 4s linear infinite; }
  </style>
  <g fill="none" stroke="#61dafb" stroke-width="2.5">
    <ellipse cx="32" cy="32" rx="28" ry="11" class="orbit" />
    <g transform="rotate(60 32 32)">
      <ellipse cx="32" cy="32" rx="28" ry="11" class="orbit-slow" />
    </g>
    <g transform="rotate(120 32 32)">
      <ellipse cx="32" cy="32" rx="28" ry="11" class="orbit-fast" />
    </g>
  </g>
  <circle cx="32" cy="32" r="5" fill="#61dafb">
    <animate attributeName="r" values="5;6.5;5" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
